<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle}">Kiblog Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css">
  <script>
    (function () {
      const storedTheme = localStorage.getItem("kiblog_theme");
      const systemTheme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
        ? "dark"
        : "light";
      document.documentElement.setAttribute("data-theme", storedTheme || systemTheme);
    })();
  </script>
  <style>
    :root {
      --bg: #ffffff;
      --text: #333333;
      --muted: #888888;
      --border: #eeeeee;
      --primary: #000000;
      --hover: #f5f5f5;
      --split-border: #dddddd;
      --surface: #ffffff;
      --surface-muted: #fafafa;
      --code-bg: #f8f8f8;
      --button-text: #ffffff;
      --shadow: rgba(15, 23, 42, 0.08);
      --danger: #d32f2f;
      --danger-border: #ffcdd2;
      --danger-surface: #fff4f4;
    }

    html[data-theme="dark"] {
      --bg: #0f1115;
      --text: #e8ecf3;
      --muted: #99a3b3;
      --border: #2a313c;
      --primary: #f5f7fb;
      --hover: #171c24;
      --split-border: #303848;
      --surface: #141922;
      --surface-muted: #11161e;
      --code-bg: #171c24;
      --button-text: #0f1115;
      --shadow: rgba(0, 0, 0, 0.35);
      --danger: #ff9f9f;
      --danger-border: rgba(255, 120, 120, 0.35);
      --danger-surface: rgba(211, 47, 47, 0.14);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      -webkit-text-size-adjust: 100%;
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--primary);
      text-decoration: none;
    }

    .user-info {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 18px;
      border: 1px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      touch-action: manipulation;
      font: inherit;
      font-weight: 600;
      transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 10px 24px var(--shadow);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }

    .btn-secondary:hover {
      background: var(--hover);
      border-color: var(--border);
    }

    .theme-toggle {
      min-width: 88px;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 18px;
      background: var(--primary);
      color: var(--button-text);
      border: 1px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
      transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
    }

    button.secondary {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }

    button:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    button.secondary:hover {
      background: var(--hover);
      border-color: var(--border);
    }

    .section-title {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 1.2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input,
    textarea {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      outline: none;
      font-size: 1rem;
      background: var(--surface);
      color: var(--text);
    }

    input:focus,
    textarea:focus {
      border-color: var(--primary);
    }

    .editor-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      height: 60vh;
      min-height: 400px;
    }

    .editor-split textarea {
      border: none;
      border-right: 1px solid var(--split-border);
      border-radius: 0;
      resize: none;
      height: 100%;
      padding: 20px;
      background: var(--surface-muted);
      font-family: source-code-pro, Menlo, Monaco, Consolas, Courier New, monospace;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .preview-pane {
      padding: 20px 30px;
      overflow-y: auto;
      background: var(--surface);
      height: 100%;
      box-sizing: border-box;
    }

    .preview-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding-bottom: 24px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }

    .preview-title {
      margin: 0 0 14px 0;
      font-size: 2rem;
      line-height: 1.3;
      color: var(--primary);
    }

    .preview-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .preview-meta-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .preview-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .preview-tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-muted);
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1;
    }

    .preview-empty {
      color: var(--muted);
      text-align: center;
      margin-top: 50px;
    }

    /* Preview styles mimicking article.html */
    .article-content {
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--text);
    }

    .article-content h1,
    .article-content h2,
    .article-content h3 {
      margin-top: 2em;
      margin-bottom: 1em;
      font-weight: 700;
    }

    .article-content h1:first-child,
    .article-content h2:first-child {
      margin-top: 0;
    }

    .article-content p {
      margin-bottom: 1.5em;
    }

    .article-content a {
      color: var(--primary);
      font-weight: 600;
      text-decoration-line: underline;
      text-decoration-thickness: 0.12em;
      text-underline-offset: 0.18em;
      text-decoration-color: color-mix(in srgb, var(--primary) 55%, transparent);
      transition: color 0.2s ease, text-decoration-color 0.2s ease, background-color 0.2s ease;
      word-break: break-word;
    }

    .article-content a:hover {
      color: var(--text);
      text-decoration-color: var(--text);
      background: color-mix(in srgb, var(--hover) 72%, transparent);
    }

    .article-content a code {
      color: inherit;
    }

    .article-content pre {
      background: var(--code-bg);
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 0.9rem;
      font-family: source-code-pro, Menlo, Monaco, Consolas, Courier New, monospace;
    }

    .article-content code {
      font-family: source-code-pro, Menlo, Monaco, Consolas, Courier New, monospace;
      background: var(--code-bg);
      padding: 2px 4px;
      border-radius: 3px;
    }

    .article-content blockquote {
      margin: 0;
      padding-left: 20px;
      border-left: 4px solid var(--border);
      color: var(--muted);
      font-style: italic;
    }

    .article-content .footnotes {
      margin-top: 3rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.95rem;
    }

    .article-content .footnotes ol {
      padding-left: 1.4rem;
    }

    .article-content .footnotes li {
      margin-bottom: 0.75rem;
    }

    .article-content .footnote-ref,
    .article-content .footnote-backref {
      color: var(--muted);
      font-size: 0.85em;
    }

    .article-content .katex-display {
      margin: 1.5rem 0;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 0.2rem;
    }

    .article-content .markdown-details {
      margin: 1.75rem 0;
      padding: 0.15rem 0 0.15rem 1rem;
      border-left: 2px solid var(--border);
    }

    .article-content .markdown-summary {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      cursor: pointer;
      color: var(--primary);
      font-weight: 700;
      user-select: none;
      list-style: none;
    }

    .article-content .markdown-summary::-webkit-details-marker {
      display: none;
    }

    .article-content .markdown-summary::before {
      content: "+";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.2rem;
      height: 1.2rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1;
    }

    .article-content .markdown-details[open] .markdown-summary::before {
      content: "-";
    }

    .article-content .markdown-details > :not(summary) {
      margin-left: 0;
      margin-right: 0;
    }

    .article-content .markdown-details > *:not(summary):first-of-type {
      margin-top: 0.9rem;
    }

    .article-content .media-frame {
      margin: 1.75rem 0;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #000000;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
    }

    .article-content .embedded-media {
      display: block;
      width: 100%;
      max-width: 100%;
      min-height: 320px;
      border: none;
    }

    .article-content .embedded-audio {
      width: 100%;
      margin: 1.5rem 0;
    }

    .article-content .task-list {
      margin: 1.5rem 0;
      padding-left: 0;
      list-style: none;
    }

    .article-content .task-list-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 0.85rem;
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
    }

    .article-content .task-list-item:last-child {
      margin-bottom: 0;
    }

    .article-content .task-list-item > label {
      display: inline-flex;
      align-items: flex-start;
      gap: 0.75rem;
      width: 100%;
      cursor: pointer;
    }

    .article-content .task-list-item input[type="checkbox"] {
      margin: 0.2rem 0 0;
      width: 1rem;
      height: 1rem;
      accent-color: var(--primary);
      flex-shrink: 0;
    }

    .article-content .task-list-item.is-checked label,
    .article-content .task-list-item.is-checked > *:not(input) {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-thickness: 0.08em;
    }

    .article-content .task-list-item.is-checked {
      color: var(--muted);
    }

    .article-content .task-list-item.is-checked input[type="checkbox"] {
      text-decoration: none;
    }

    .article-content figure {
      margin: 1.75rem 0;
    }

    .article-content figcaption {
      margin-top: 0.65rem;
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
    }

    .article-content .table-scroll {
      margin: 1.75rem 0;
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
    }

    .article-content table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
      font-size: 0.98rem;
    }

    .article-content th,
    .article-content td {
      padding: 0.95rem 1rem;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    .article-content th {
      background: var(--surface-muted);
      color: var(--primary);
      font-weight: 700;
      white-space: nowrap;
    }

    .article-content tbody tr:nth-child(even) td {
      background: var(--surface-muted);
    }

    .article-content tbody tr:last-child td {
      border-bottom: none;
    }

    @media (max-width: 768px) {
      .article-content .embedded-media {
        min-height: 220px;
      }
    }

    .article-content> :first-child {
      margin-top: 0;
    }

    .article-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
    }

    .article-item {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      transition: box-shadow 0.2s;
    }

    .article-item:hover {
      box-shadow: 0 10px 24px var(--shadow);
    }

    .article-info h3 {
      margin: 0 0 10px 0;
      font-size: 1.1rem;
      line-height: 1.4;
    }

    .article-info p {
      margin: 0 0 15px 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .article-actions {
      display: flex;
      gap: 10px;
      border-top: 1px solid var(--border);
      padding-top: 15px;
    }

    .danger {
      background: var(--danger-surface);
      color: var(--danger);
      border: 1px solid var(--danger-border);
    }

    .danger:hover {
      background: var(--danger);
      color: #ffffff;
    }

    .site-footer {
      margin-top: 56px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.04em;
    }

    .editor-form-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 15px;
    }

    .editor-actions {
      display: flex;
      justify-content: flex-end;
      gap: 15px;
      margin-top: 10px;
    }

    @media (max-width: 960px) {
      .editor-form-row {
        grid-template-columns: 1fr;
      }

      .editor-split {
        grid-template-columns: 1fr;
        height: auto;
      }

      .editor-split textarea {
        min-height: 280px;
        border-right: none;
        border-bottom: 1px solid var(--split-border);
      }

      .preview-pane {
        min-height: 280px;
        padding: 20px;
      }
    }

    @media (max-width: 720px) {
      .container {
        padding: 28px 16px;
      }

      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 18px;
        margin-bottom: 28px;
      }

      .user-info {
        width: 100%;
        justify-content: space-between;
        gap: 12px;
      }

      .section-title {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .article-list {
        grid-template-columns: 1fr;
        margin-bottom: 40px;
      }

      .article-item {
        padding: 16px;
      }

      .article-actions {
        flex-direction: column;
      }

      .editor-actions {
        flex-direction: column-reverse;
        position: sticky;
        bottom: 0;
        padding-top: 12px;
        padding-bottom: calc(6px + env(safe-area-inset-bottom));
        background: linear-gradient(to top, var(--bg) 72%, rgba(255, 255, 255, 0));
      }

      .editor-actions button {
        width: 100%;
      }
    }

    @media (max-width: 420px) {
      .theme-toggle {
        min-width: 76px;
      }

      .preview-title {
        font-size: 1.6rem;
      }

      .article-info h3 {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <div class="container" id="app">
    <header>
      <a href="/" class="logo">Kiblog Admin.</a>
      <div class="user-info">
        <button type="button" class="btn btn-secondary theme-toggle" data-theme-toggle><span
            data-theme-label>深色</span></button>
        <button class="secondary" id="logoutBtn">退出登录</button>
      </div>
    </header>

    <div class="list-section">
      <h2 class="section-title">
        文章管理
        <span style="font-size:0.9rem; color:var(--muted); font-weight:normal;" id="articleCount">共 0 篇文章</span>
      </h2>
      <div class="article-list" id="articleList">
      </div>
    </div>

    <div class="editor-section" id="editorArea">
      <h2 class="section-title">发布 / 更新文章</h2>
      <form id="editorForm">
        <input type="hidden" id="articleId">
        <div class="editor-form-row">
          <input type="text" id="title" placeholder="文章标题" required>
          <input type="text" id="author" placeholder="作者" th:value="${defaultAuthor}">
          <input type="text" id="tags" placeholder="标签 (逗号分隔)">
        </div>

        <div class="editor-split">
          <textarea id="content" placeholder="文章正文 (支持 Markdown, 输入即可在右侧预览)" required></textarea>
          <div class="preview-pane" id="previewPane">
            <div style="color: var(--muted); text-align: center; margin-top: 50px;">在此处预览渲染内容...</div>
          </div>
        </div>

        <div class="editor-actions">
          <button type="button" class="secondary" id="cancelEditBtn"
            style="display: none; padding: 0 24px;">取消编辑</button>
          <button type="submit" id="saveBtn" style="padding: 0 32px;">发布文章</button>
        </div>
      </form>
    </div>
    <footer class="site-footer">powered by Kiblog</footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-footnote/dist/markdown-it-footnote.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-task-lists/dist/markdown-it-task-lists.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js"></script>
  <script src="/js/markdown.js"></script>
  <script src="/js/theme.js"></script>
  <script th:inline="none">
    const TOKEN_KEY = "kiblog_admin_token";
    const app = document.getElementById("app");
    const editorForm = document.getElementById("editorForm");
    const articleList = document.getElementById("articleList");
    const logoutBtn = document.getElementById("logoutBtn");
    const cancelEditBtn = document.getElementById("cancelEditBtn");
    const saveBtn = document.getElementById("saveBtn");
    const titleInput = document.getElementById("title");
    const authorInput = document.getElementById("author");
    const tagsInput = document.getElementById("tags");
    const contentInput = document.getElementById("content");
    const previewPane = document.getElementById("previewPane");
    const articleCount = document.getElementById("articleCount");

    const authHeaders = () => {
      const token = localStorage.getItem(TOKEN_KEY);
      if (!token) {
        window.location.replace("/admin/login");
      }
      return {
        "Authorization": "Bearer " + token,
        "Content-Type": "application/json"
      };
    };

    function escapeHtml(value) {
      const normalizedValue = String(value ?? "");
      return normalizedValue.replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderMarkdown(markdown) {
      if (!markdown) {
        return '<div class="preview-empty">在此处预览渲染内容...</div>';
      }
      if (window.KiblogMarkdown && typeof window.KiblogMarkdown.renderToHtml === "function") {
        return window.KiblogMarkdown.renderToHtml(markdown);
      }
      return `<p>${escapeHtml(markdown).replace(/\n/g, "<br>")}</p>`;
    }

    function estimateReadingMinutes(markdown) {
      const plainText = window.KiblogMarkdown && typeof window.KiblogMarkdown.stripMarkdown === "function"
        ? window.KiblogMarkdown.stripMarkdown(markdown)
        : String(markdown ?? "").replace(/\s+/g, "");

      return Math.max(1, Math.ceil(plainText.length / 400));
    }

    function renderPreview() {
      const title = titleInput.value.trim() || "未命名文章";
      const author = authorInput.value.trim() || "admin";
      const content = contentInput.value.trim();
      const tags = tagsInput.value
        .split(',')
        .map(tag => tag.trim())
        .filter(tag => tag);
      const previewDate = new Date().toLocaleDateString('zh-CN');
      const readingMinutes = estimateReadingMinutes(content);
      const tagsMarkup = tags.length
        ? '<div class="preview-tags">' + tags.map(tag => '<span class="preview-tag">' + escapeHtml(tag) + '</span>').join("") + '</div>'
        : "";
      const contentMarkup = renderMarkdown(content);

      previewPane.innerHTML = `
                <div class="preview-header">
                    <h1 class="preview-title">${escapeHtml(title)}</h1>
                    <div class="preview-meta">
                        <span class="preview-meta-item">发布于 ${escapeHtml(previewDate)}</span>
                        <span class="preview-meta-item">作者 ${escapeHtml(author)}</span>
                        <span class="preview-meta-item">约 ${readingMinutes} 分钟阅读</span>
                    </div>
                    ${tagsMarkup}
                </div>
                <div class="article-content">${contentMarkup}</div>
            `;

      if (content && window.KiblogMarkdown && typeof window.KiblogMarkdown.renderInto === "function") {
        const previewContent = previewPane.querySelector(".article-content");
        if (previewContent) {
          window.KiblogMarkdown.renderInto(previewContent, content);
        }
      }
    }

    [titleInput, authorInput, tagsInput, contentInput].forEach(input => {
      input.addEventListener('input', renderPreview);
    });

    async function fetchArticles() {
      try {
        const pageSize = 100;
        let currentPage = 0;
        let articles = [];
        let hasNextPage = true;

        while (hasNextPage) {
          const res = await fetch('/articles?page=' + currentPage + '&size=' + pageSize);
          if (res.status === 401 || res.status === 403) {
            localStorage.removeItem(TOKEN_KEY);
            window.location.replace("/admin/login");
            return;
          }

          const data = await res.json();
          const pageData = data.data || {};
          const pageContent = Array.isArray(pageData.content) ? pageData.content : [];
          articles = articles.concat(pageContent);

          hasNextPage = pageData.last === false;
          currentPage += 1;
        }

        articleCount.textContent = "共 " + articles.length + " 篇文章";
        renderArticles(articles);
      } catch (e) {
        console.error(e);
        articleList.innerHTML = '<div class="article-item"><div class="article-info"><h3>文章列表加载失败</h3><p>请检查登录状态或稍后重试。</p></div></div>';
      }
    }

    function renderArticles(articles) {
      articleList.replaceChildren();

      const fragment = document.createDocumentFragment();

      articles.forEach(a => {
        const item = document.createElement("div");
        item.className = "article-item";

        const info = document.createElement("div");
        info.className = "article-info";

        const title = document.createElement("h3");
        title.textContent = a.title || "未命名文章";

        const meta = document.createElement("p");
        meta.textContent = a.createTime ? new Date(a.createTime).toLocaleString() : "暂无发布时间";

        info.appendChild(title);
        info.appendChild(meta);

        const actions = document.createElement("div");
        actions.className = "article-actions";

        const editButton = document.createElement("button");
        editButton.className = "secondary";
        editButton.style.flex = "1";
        editButton.type = "button";
        editButton.textContent = "编辑";
        editButton.addEventListener("click", function () {
          editArticle(a);
        });

        const deleteButton = document.createElement("button");
        deleteButton.className = "danger";
        deleteButton.style.flex = "1";
        deleteButton.type = "button";
        deleteButton.textContent = "删除";
        deleteButton.addEventListener("click", function () {
          deleteArticle(a.id);
        });

        actions.appendChild(editButton);
        actions.appendChild(deleteButton);

        item.appendChild(info);
        item.appendChild(actions);
        fragment.appendChild(item);
      });

      articleList.appendChild(fragment);
    }

    editorForm.addEventListener("submit", async e => {
      e.preventDefault();
      const tagsStr = document.getElementById('tags').value;
      const tagsArray = tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(t => t) : [];

      const payload = {
        title: document.getElementById('title').value,
        author: document.getElementById('author').value || 'admin',
        tags: tagsArray,
        content: contentInput.value
      };
      const id = document.getElementById('articleId').value;
      const url = id ? '/admin/update?id=' + id : '/admin/add';
      const method = id ? 'PUT' : 'POST';

      try {
        const res = await fetch(url, {
          method,
          headers: authHeaders(),
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          alert(id ? "更新成功！" : "发布成功！");
          resetEditState();
          fetchArticles();
        } else {
          alert("操作失败！");
        }
      } catch (e) {
        console.error(e);
      }
    });

    window.editArticle = function (a) {
      document.getElementById('articleId').value = a.id;
      titleInput.value = a.title;
      authorInput.value = a.author;
      tagsInput.value = (a.tags || []).join(', ');
      contentInput.value = a.content;

      renderPreview();

      saveBtn.textContent = "更新文章";
      cancelEditBtn.style.display = "block";

      // 滚动到编辑器区域
      document.getElementById("editorArea").scrollIntoView({ behavior: 'smooth' });
    };

    window.deleteArticle = async function (id) {
      if (!confirm("确定要删除这篇文章吗？")) return;
      try {
        const res = await fetch('/admin/delete?id=' + id, {
          method: 'DELETE',
          headers: authHeaders()
        });
        if (res.ok) {
          fetchArticles();
        }
      } catch (e) {
        console.error(e);
      }
    };

    cancelEditBtn.addEventListener("click", resetEditState);

    function resetEditState() {
      editorForm.reset();
      document.getElementById('articleId').value = "";

      renderPreview();

      saveBtn.textContent = "发布文章";
      cancelEditBtn.style.display = "none";
    }

    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem(TOKEN_KEY);
      window.location.replace("/admin/login");
    });

    // Initialize
    if (localStorage.getItem(TOKEN_KEY)) {
      try {
        renderPreview();
        fetchArticles();
      } catch (e) {
        console.error(e);
        previewPane.innerHTML = '<div class="preview-empty">预览加载失败，请刷新页面后重试。</div>';
      }
    } else {
      window.location.replace("/admin/login");
    }
  </script>
</body>

</html>
