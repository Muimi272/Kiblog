<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">文章详情 - Kiblog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css">
    <script>
        (function () {
            const storedTheme = localStorage.getItem("kiblog_theme");
            const systemTheme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
            document.documentElement.setAttribute("data-theme", storedTheme || systemTheme);
        })();
    </script>
    <style>
        :root {
            --bg: #ffffff;
            --text: #333333;
            --muted: #888888;
            --border: #eeeeee;
            --primary: #000000;
            --hover: #f5f5f5;
            --surface: #ffffff;
            --surface-muted: #fafafa;
            --code-bg: #f8f8f8;
            --button-text: #ffffff;
        }
        html[data-theme="dark"] {
            --bg: #0f1115;
            --text: #e8ecf3;
            --muted: #99a3b3;
            --border: #2a313c;
            --primary: #f5f7fb;
            --hover: #171c24;
            --surface: #141922;
            --surface-muted: #11161e;
            --code-bg: #171c24;
            --button-text: #0f1115;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.8;
            margin: 0;
            padding: 0;
            -webkit-text-size-adjust: 100%;
            transition: background-color 0.25s ease, color 0.25s ease;
        }
        a {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.2s;
        }
        a:hover {
            color: var(--muted);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 40px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 40px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: -0.5px;
        }
        .nav-links {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 20px;
        }
        .nav-links > a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 14px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--surface);
            color: var(--text);
            font-size: 0.95rem;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }
        .nav-links > a:hover {
            background: var(--hover);
            color: var(--text);
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 42px;
            padding: 0 18px;
            border: 1px solid transparent;
            border-radius: 999px;
            cursor: pointer;
            touch-action: manipulation;
            font: inherit;
            font-weight: 600;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }
        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border-color: var(--border);
        }
        .btn-secondary:hover {
            background: var(--hover);
        }
        .theme-toggle {
            min-width: 88px;
        }
        
        .article-header {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .article-title {
            font-size: clamp(2rem, 6vw, 2.8rem);
            font-weight: 800;
            margin-bottom: 16px;
            line-height: 1.3;
        }
        .article-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 18px;
            color: var(--muted);
            font-size: 0.95rem;
        }
        .article-meta-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--surface-muted);
            color: var(--muted);
            font-size: 0.85rem;
            line-height: 1;
        }
        .article-content {
            font-size: 1.1rem;
        }
        .article-content h1, .article-content h2, .article-content h3 {
            margin-top: 2em;
            margin-bottom: 1em;
            font-weight: 700;
        }
        .article-content p {
            margin-bottom: 1.5em;
        }
        .article-content ul,
        .article-content ol {
            padding-left: 1.4rem;
        }
        .article-content img {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 1.75rem auto;
            border-radius: 18px;
        }
        .article-content a {
            color: var(--primary);
            font-weight: 600;
            text-decoration-line: underline;
            text-decoration-thickness: 0.12em;
            text-underline-offset: 0.18em;
            text-decoration-color: color-mix(in srgb, var(--primary) 55%, transparent);
            transition: color 0.2s ease, text-decoration-color 0.2s ease, background-color 0.2s ease;
            word-break: break-word;
        }
        .article-content a:hover {
            color: var(--text);
            text-decoration-color: var(--text);
            background: color-mix(in srgb, var(--hover) 72%, transparent);
        }
        .article-content a code {
            color: inherit;
        }
        .article-content pre {
            background: var(--code-bg);
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 0.9rem;
            font-family: source-code-pro, Menlo, Monaco, Consolas, "Courier New", monospace;
        }
        .article-content code {
            font-family: source-code-pro, Menlo, Monaco, Consolas, "Courier New", monospace;
            background: var(--code-bg);
            padding: 2px 4px;
            border-radius: 3px;
        }
        .article-content blockquote {
            margin: 0;
            padding-left: 20px;
            border-left: 4px solid var(--border);
            color: var(--muted);
            font-style: italic;
        }
        .article-content .footnotes {
            margin-top: 3rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.95rem;
        }
        .article-content .footnotes ol {
            padding-left: 1.4rem;
        }
        .article-content .footnotes li {
            margin-bottom: 0.75rem;
        }
        .article-content .footnote-ref,
        .article-content .footnote-backref {
            color: var(--muted);
            font-size: 0.85em;
        }
        .article-content .katex-display {
            margin: 1.5rem 0;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 0.2rem;
        }
        .article-content .markdown-details {
            margin: 1.75rem 0;
            padding: 0.15rem 0 0.15rem 1rem;
            border-left: 2px solid var(--border);
        }
        .article-content .markdown-summary {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            cursor: pointer;
            color: var(--primary);
            font-weight: 700;
            user-select: none;
            list-style: none;
        }
        .article-content .markdown-summary::-webkit-details-marker {
            display: none;
        }
        .article-content .markdown-summary::before {
            content: "+";
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.2rem;
            height: 1.2rem;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1;
        }
        .article-content .markdown-details[open] .markdown-summary::before {
            content: "-";
        }
        .article-content .markdown-details > :not(summary) {
            margin-left: 0;
            margin-right: 0;
        }
        .article-content .markdown-details > *:not(summary):first-of-type {
            margin-top: 0.9rem;
        }
        .article-content .media-frame {
            margin: 1.75rem 0;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: #000000;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
        }
        .article-content .embedded-media {
            display: block;
            width: 100%;
            max-width: 100%;
            min-height: 360px;
            border: none;
        }
        .article-content .embedded-audio {
            width: 100%;
            margin: 1.5rem 0;
        }
        .article-content .task-list {
            margin: 1.5rem 0;
            padding-left: 0;
            list-style: none;
        }
        .article-content .task-list-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 0.85rem;
            padding: 0.85rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--surface);
        }
        .article-content .task-list-item:last-child {
            margin-bottom: 0;
        }
        .article-content .task-list-item > label {
            display: inline-flex;
            align-items: flex-start;
            gap: 0.75rem;
            width: 100%;
            cursor: pointer;
        }
        .article-content .task-list-item input[type="checkbox"] {
            margin: 0.2rem 0 0;
            width: 1rem;
            height: 1rem;
            accent-color: var(--primary);
            flex-shrink: 0;
        }
        .article-content .task-list-item.is-checked label,
        .article-content .task-list-item.is-checked > *:not(input) {
            color: var(--muted);
            text-decoration: line-through;
            text-decoration-thickness: 0.08em;
        }
        .article-content .task-list-item.is-checked {
            color: var(--muted);
        }
        .article-content .task-list-item.is-checked input[type="checkbox"] {
            text-decoration: none;
        }
        .article-content figure {
            margin: 1.75rem 0;
        }
        .article-content figcaption {
            margin-top: 0.65rem;
            color: var(--muted);
            font-size: 0.92rem;
            text-align: center;
        }
        .article-content .table-scroll {
            margin: 1.75rem 0;
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--surface);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
        }
        .article-content table {
            width: 100%;
            min-width: 560px;
            border-collapse: collapse;
            font-size: 0.98rem;
        }
        .article-content th,
        .article-content td {
            padding: 0.95rem 1rem;
            border-bottom: 1px solid var(--border);
            text-align: left;
            vertical-align: top;
        }
        .article-content th {
            background: var(--surface-muted);
            color: var(--primary);
            font-weight: 700;
            white-space: nowrap;
        }
        .article-content tbody tr:nth-child(even) td {
            background: var(--surface-muted);
        }
        .article-content tbody tr:last-child td {
            border-bottom: none;
        }
        @media (max-width: 768px) {
            .article-content .embedded-media {
                min-height: 220px;
            }
        }
        @media (max-width: 720px) {
            .container {
                padding: 28px 16px;
            }
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 18px;
                padding-bottom: 28px;
                margin-bottom: 28px;
            }
            .nav-links {
                width: 100%;
                justify-content: space-between;
                gap: 12px;
            }
            .article-header {
                margin-bottom: 30px;
            }
            .article-meta {
                font-size: 0.9rem;
            }
            .article-content {
                font-size: 1rem;
            }
            .article-content p {
                margin-bottom: 1.2em;
            }
            .article-content ul,
            .article-content ol {
                padding-left: 1.2rem;
            }
            .article-content pre {
                padding: 12px;
                font-size: 0.85rem;
            }
            .article-content th,
            .article-content td {
                padding: 0.8rem 0.85rem;
            }
            .error-state {
                padding: 36px 0 18px;
            }
        }
        @media (max-width: 420px) {
            .theme-toggle {
                min-width: 76px;
            }
            .nav-links > a {
                padding: 0 12px;
            }
            .tag {
                padding: 5px 10px;
                font-size: 0.78rem;
            }
        }
        
        .error-state {
            text-align: center;
            padding: 60px 0;
            color: var(--muted);
        }
        .error-state h1 {
            color: var(--primary);
        }
        .site-footer {
            margin-top: 56px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--muted);
            font-size: 0.82rem;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="logo" th:text="${brandSiteName}">Kiblog</a>
            <div class="nav-links">
                <button type="button" class="btn btn-secondary theme-toggle" data-theme-toggle><span data-theme-label>深色</span></button>
                <a href="/">首页</a>
            </div>
        </header>

        <main>
            <div th:if="${notFound}" class="error-state">
                <h1>文章未找到 / 404</h1>
                <p th:text="${missingMessage}">抱歉，您要访问的文章不存在。</p>
                <br>
                <a href="/">&larr; 返回首页</a>
            </div>

            <article th:if="${!notFound}">
                <header class="article-header">
                    <h1 class="article-title" th:text="${article.title}">文章标题</h1>
                    <div class="article-meta">
                        <span class="article-meta-item" th:text="'发布于 ' + ${#temporals.format(article.createTime, 'yyyy-MM-dd HH:mm')}">发布时间</span>
                        <span class="article-meta-item" th:text="'作者 ' + ${article.author}">作者</span>
                        <span class="article-meta-item" th:text="'约 ' + ${readingMinutes} + ' 分钟阅读'">阅读时间</span>
                    </div>
                    <div class="article-tags" th:if="${!#lists.isEmpty(articleTags)}">
                        <span class="tag" th:each="tag : ${articleTags}" th:text="${tag}">标签</span>
                    </div>
                </header>

                <textarea id="raw-content" style="display: none;" th:text="${article.content}"></textarea>
                <div class="article-content" id="rendered-content">
                    正在加载内容...
                </div>
            </article>
        </main>
        <footer class="site-footer">powered by Kiblog</footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-footnote/dist/markdown-it-footnote.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-task-lists/dist/markdown-it-task-lists.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js"></script>
    <script src="/js/markdown.js"></script>
    <script src="/js/theme.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var rawContentEle = document.getElementById('raw-content');
            var renderedContentEle = document.getElementById('rendered-content');
            if (rawContentEle && renderedContentEle) {
                var markdownText = rawContentEle.value;
                window.KiblogMarkdown.renderInto(renderedContentEle, markdownText);
            }
        });
    </script>
</body>
</html>
