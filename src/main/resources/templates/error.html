<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${(status != null ? '错误 ' + status : '页面错误') + ' - ' + brandSiteName}">页面错误 - Kiblog</title>
    <script>
        (function () {
            const storedTheme = localStorage.getItem("kiblog_theme");
            const systemTheme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
            document.documentElement.setAttribute("data-theme", storedTheme || systemTheme);
        })();
    </script>
    <style>
        :root {
            --bg: #ffffff;
            --text: #333333;
            --muted: #888888;
            --border: #eeeeee;
            --primary: #000000;
            --hover: #f5f5f5;
            --surface: #ffffff;
            --surface-muted: #fafafa;
            --button-text: #ffffff;
            --shadow: rgba(15, 23, 42, 0.08);
        }
        html[data-theme="dark"] {
            --bg: #0f1115;
            --text: #e8ecf3;
            --muted: #99a3b3;
            --border: #2a313c;
            --primary: #f5f7fb;
            --hover: #171c24;
            --surface: #141922;
            --surface-muted: #11161e;
            --button-text: #0f1115;
            --shadow: rgba(0, 0, 0, 0.35);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.7;
            transition: background-color 0.25s ease, color 0.25s ease;
        }
        a {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        a:hover {
            color: var(--muted);
        }
        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            padding-bottom: 32px;
            border-bottom: 1px solid var(--border);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 42px;
            padding: 0 18px;
            border: 1px solid transparent;
            border-radius: 999px;
            cursor: pointer;
            font: inherit;
            font-weight: 600;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px var(--shadow);
        }
        .btn-primary {
            background: var(--primary);
            color: var(--button-text);
        }
        .btn-primary:hover {
            opacity: 0.92;
        }
        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border-color: var(--border);
        }
        .btn-secondary:hover {
            background: var(--hover);
        }
        .theme-toggle {
            min-width: 88px;
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 56px 0;
        }
        .error-shell {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 42px 36px;
            background:
                radial-gradient(circle at top left, rgba(120, 120, 120, 0.12), transparent 40%),
                var(--surface);
            box-shadow: 0 24px 60px var(--shadow);
        }
        .status-chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--surface-muted);
            color: var(--muted);
            font-size: 0.82rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .error-title {
            margin: 18px 0 14px;
            font-size: clamp(2rem, 5vw, 3.2rem);
            line-height: 1.15;
            letter-spacing: -0.04em;
        }
        .error-message {
            margin: 0;
            max-width: 620px;
            color: var(--muted);
            font-size: 1.02rem;
        }
        .error-path {
            margin-top: 24px;
            padding: 14px 16px;
            border: 1px dashed var(--border);
            border-radius: 16px;
            background: var(--surface-muted);
            color: var(--muted);
            font-size: 0.92rem;
            word-break: break-all;
        }
        .error-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 28px;
        }
        .site-footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--muted);
            font-size: 0.82rem;
            letter-spacing: 0.04em;
        }
        @media (max-width: 720px) {
            .container {
                padding: 24px 16px;
            }
            header {
                align-items: flex-start;
                flex-direction: column;
            }
            .nav-links {
                width: 100%;
                justify-content: space-between;
            }
            .error-shell {
                padding: 30px 22px;
                border-radius: 22px;
            }
            .error-actions {
                flex-direction: column;
            }
            .error-actions .btn,
            .error-actions a.btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="logo" th:text="${brandSiteName}">Kiblog</a>
            <div class="nav-links">
                <button type="button" class="btn btn-secondary theme-toggle" data-theme-toggle><span data-theme-label>深色</span></button>
                <a href="/">首页</a>
            </div>
        </header>

        <main>
            <section class="error-shell" aria-labelledby="errorTitle">
                <span class="status-chip" th:text="'HTTP ' + ${status}">HTTP 500</span>
                <h1 class="error-title" id="errorTitle"
                    th:text="${
                        status == 400 ? '请求无效 / 400' :
                        status == 401 ? '未授权访问 / 401' :
                        status == 403 ? '禁止访问 / 403' :
                        status == 404 ? '页面未找到 / 404' :
                        '服务器错误 / ' + status
                    }">页面未找到 / 404</h1>
                <p class="error-message"
                   th:text="${
                       message != null and !#strings.isEmpty(message) ? message :
                       status == 400 ? '请求格式不正确，服务器无法处理当前请求。' :
                       status == 401 ? '当前操作需要登录后才能继续。' :
                       status == 403 ? '抱歉，您没有权限访问这个页面。' :
                       status == 404 ? '抱歉，您访问的页面不存在，或者它已经被移动。' :
                       '服务器开了个小差，请稍后刷新重试。'
                   }">抱歉，您访问的页面不存在，或者它已经被移动。</p>
                <div class="error-path" th:if="${path != null and !#strings.isEmpty(path)}">
                    <strong>请求路径：</strong>
                    <span th:text="${path}">/missing-page</span>
                </div>
                <div class="error-actions">
                    <a href="/" class="btn btn-primary">返回首页</a>
                    <button type="button" class="btn btn-secondary" onclick="window.history.back()">返回上一页</button>
                </div>
            </section>
        </main>

        <footer class="site-footer">powered by Kiblog</footer>
    </div>

    <script src="/js/theme.js"></script>
</body>
</html>
