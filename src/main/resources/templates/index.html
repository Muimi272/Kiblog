<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Kiblog</title>
    <script>
        (function () {
            const storedTheme = localStorage.getItem("kiblog_theme");
            const systemTheme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
            document.documentElement.setAttribute("data-theme", storedTheme || systemTheme);
        })();
    </script>
    <style>
        :root {
            --bg: #ffffff;
            --text: #333333;
            --muted: #888888;
            --border: #eeeeee;
            --primary: #000000;
            --hover: #f5f5f5;
            --surface: #ffffff;
            --surface-muted: #fafafa;
            --shadow: rgba(15, 23, 42, 0.08);
            --input-bg: #ffffff;
            --button-text: #ffffff;
        }
        html[data-theme="dark"] {
            --bg: #0f1115;
            --text: #e8ecf3;
            --muted: #99a3b3;
            --border: #2a313c;
            --primary: #f5f7fb;
            --hover: #171c24;
            --surface: #141922;
            --surface-muted: #11161e;
            --shadow: rgba(0, 0, 0, 0.35);
            --input-bg: #141922;
            --button-text: #0f1115;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            -webkit-text-size-adjust: 100%;
            transition: background-color 0.25s ease, color 0.25s ease;
        }
        a {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.2s;
        }
        a:hover {
            color: var(--muted);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 40px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 40px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: -0.5px;
        }
        .nav-links {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 20px;
        }
        .nav-links > a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 14px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--surface);
            color: var(--text);
            font-size: 0.95rem;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }
        .nav-links > a:hover {
            background: var(--hover);
            color: var(--text);
            transform: translateY(-1px);
            box-shadow: 0 10px 24px var(--shadow);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 42px;
            padding: 0 18px;
            border: 1px solid transparent;
            border-radius: 999px;
            cursor: pointer;
            touch-action: manipulation;
            font: inherit;
            font-weight: 600;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px var(--shadow);
        }
        .btn-primary {
            background: var(--primary);
            color: var(--button-text);
        }
        .btn-primary:hover {
            opacity: 0.92;
        }
        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border-color: var(--border);
        }
        .btn-secondary:hover {
            background: var(--hover);
        }
        .theme-toggle {
            min-width: 88px;
        }
        .hero {
            margin-bottom: 40px;
            text-align: center;
        }
        .hero h1 {
            font-size: clamp(2.1rem, 6vw, 2.8rem);
            margin-bottom: 10px;
            font-weight: 800;
            line-height: 1.18;
        }
        .hero p {
            color: var(--muted);
            font-size: 1.1rem;
            max-width: 680px;
            margin: 0 auto;
        }
        .search-bar {
            display: flex;
            margin: 30px 0;
            justify-content: center;
            gap: 0;
        }
        .search-bar input {
            padding: 10px 15px;
            width: min(100%, 360px);
            min-width: 0;
            border: 1px solid var(--border);
            border-radius: 4px 0 0 4px;
            outline: none;
            background: var(--input-bg);
            color: var(--text);
            font-size: 1rem;
            box-sizing: border-box;
        }
        .search-bar button {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }
        .about-trigger {
            width: 52px;
            min-width: 52px;
            padding: 0;
        }
        .about-trigger svg {
            width: 26px;
            height: 26px;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        .about-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(15, 23, 42, 0.34);
            z-index: 30;
        }
        .about-modal.is-open {
            display: flex;
        }
        .about-dialog {
            width: min(100%, 560px);
            max-height: min(80vh, 640px);
            padding: 28px 26px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--surface);
            box-shadow: 0 24px 60px var(--shadow);
            overflow-y: auto;
        }
        .about-dialog-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }
        .about-identity {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            min-width: 0;
        }
        .about-avatar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 58px;
            height: 58px;
            border: 1px solid var(--border);
            border-radius: 50%;
            background:
                radial-gradient(circle at top left, rgba(120, 120, 120, 0.18), transparent 55%),
                var(--surface-muted);
            color: var(--primary);
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            flex-shrink: 0;
        }
        .about-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
        }
        .about-heading {
            min-width: 0;
        }
        .about-dialog-title {
            margin: 0;
            font-size: 1.55rem;
            line-height: 1.3;
        }
        .about-subtitle {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 0.98rem;
            line-height: 1.75;
        }
        .about-close {
            min-width: 42px;
            width: 42px;
            padding: 0;
            flex-shrink: 0;
        }
        .about-body {
            color: var(--muted);
            line-height: 1.85;
        }
        .about-body p {
            margin: 0 0 14px;
        }
        .about-body p:last-child {
            margin-bottom: 0;
        }
        .section-intro {
            margin-bottom: 24px;
        }
        .section-intro h2 {
            margin: 0 0 8px;
            font-size: 1.35rem;
        }
        .section-intro p {
            margin: 0;
            color: var(--muted);
        }
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .article-item {
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border);
        }
        .article-title {
            font-size: 1.5rem;
            margin: 0 0 12px 0;
            line-height: 1.35;
        }
        .article-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            margin-bottom: 14px;
            color: var(--muted);
            font-size: 0.9rem;
        }
        .article-meta-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
        }
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--surface-muted);
            color: var(--muted);
            font-size: 0.82rem;
            line-height: 1;
        }
        .article-summary {
            color: var(--text);
            margin-bottom: 15px;
        }
        .read-more {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 42px;
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            font-size: 0.9rem;
            gap: 16px;
        }
        .pagination a {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 4px;
            white-space: nowrap;
        }
        .pagination a:hover {
            background: var(--hover);
            color: var(--primary);
        }
        .page-info {
            color: var(--muted);
        }
        .empty-state {
            text-align: center;
            padding: 60px 0;
            color: var(--muted);
        }
        .site-footer {
            margin-top: 56px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--muted);
            font-size: 0.82rem;
            letter-spacing: 0.04em;
        }
        @media (max-width: 720px) {
            .container {
                padding: 28px 16px;
            }
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 18px;
                padding-bottom: 28px;
                margin-bottom: 28px;
            }
            .nav-links {
                width: 100%;
                justify-content: space-between;
                gap: 12px;
            }
            .hero {
                margin-bottom: 32px;
                text-align: left;
            }
            .hero p {
                margin: 0;
                font-size: 1rem;
            }
            .section-intro {
                margin-bottom: 18px;
            }
            .search-bar {
                flex-direction: column;
                gap: 10px;
                align-items: stretch;
                width: 100%;
            }
            .search-bar input,
            .search-bar button {
                width: 100%;
                border-radius: 999px;
            }
            .article-item {
                padding: 20px 18px;
                border: 1px solid var(--border);
                border-radius: 22px;
                background: var(--surface);
                box-shadow: 0 16px 36px var(--shadow);
            }
            .article-title {
                font-size: 1.3rem;
            }
            .article-list {
                gap: 18px;
            }
            .read-more {
                width: 100%;
                justify-content: center;
                margin-top: 4px;
                border: 1px solid var(--border);
                border-radius: 999px;
                background: var(--surface-muted);
                letter-spacing: 0.08em;
            }
            .pagination {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .pagination a {
                width: 100%;
                box-sizing: border-box;
            }
            .about-dialog {
                width: 100%;
                max-height: min(86vh, 720px);
                margin-top: auto;
                padding: 24px 18px calc(22px + env(safe-area-inset-bottom));
                border-bottom-left-radius: 0;
                border-bottom-right-radius: 0;
                border-top-left-radius: 24px;
                border-top-right-radius: 24px;
                box-shadow: 0 -24px 60px var(--shadow);
            }
            .about-dialog-header {
                display: grid;
                grid-template-columns: minmax(0, 1fr) auto;
                align-items: flex-start;
            }
            .about-close {
                align-self: flex-start;
                justify-self: end;
            }
            .about-avatar {
                width: 52px;
                height: 52px;
                font-size: 0.96rem;
            }
        }
        @media (max-width: 420px) {
            .nav-links {
                justify-content: flex-start;
            }
            .about-modal {
                padding: 0;
                align-items: flex-end;
            }
            .about-identity {
                min-width: 0;
            }
            .theme-toggle {
                min-width: 76px;
            }
            .tag {
                padding: 5px 10px;
                font-size: 0.78rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="logo" th:text="${brandSiteName}">Kiblog</a>
            <div class="nav-links">
                <button type="button" class="btn btn-secondary about-trigger" id="aboutOpenBtn" aria-label="打开个人简介" title="个人简介">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-hidden="true" focusable="false">
                        <circle cx="50" cy="32" r="16" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M 20,88 C 20,60 80,60 80,88" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="sr-only">个人简介</span>
                </button>
                <button type="button" class="btn btn-secondary theme-toggle" data-theme-toggle><span data-theme-label>深色</span></button>
                <a href="/">首页</a>
            </div>
        </header>

        <section class="hero">
            <h1 th:text="${heroTitle}">Hero Title</h1>
            <p th:text="${heroSubtitle}">Hero Subtitle</p>
            
            <form action="/search" method="get" class="search-bar">
                <input type="text" name="keyword" th:value="${searchKeyword}" placeholder="搜索文章...">
                <button type="submit" class="btn btn-primary">搜索</button>
            </form>
        </section>

        <main>
            <section class="section-intro" th:if="${hasArticles}">
                <h2 th:text="${brandHomeArticlesTitle}">最新文章</h2>
                <p th:text="${brandHomeArticlesDescription}">从最近写下的内容开始浏览，看看这段时间我在关注什么。</p>
            </section>

            <div th:if="${!hasArticles}" class="empty-state">
                <p>这里空空如也，什么也没有找到。</p>
            </div>

            <div th:if="${hasArticles}" class="article-list">
                <div class="article-item" th:each="article : ${articles}">
                    <h2 class="article-title">
                        <a th:href="@{'/article/' + ${article.id}}" th:text="${article.title}">文章标题</a>
                    </h2>
                    <div class="article-meta">
                        <span class="article-meta-item" th:text="'发布于 ' + ${#temporals.format(article.createTime, 'yyyy-MM-dd')}">发布于 2026-01-01</span>
                        <span class="article-meta-item" th:text="'作者 ' + ${article.author}">作者</span>
                    </div>
                    <div class="article-tags" th:if="${article.tags != null and !article.tags.isEmpty()}">
                        <span class="tag" th:each="tag : ${article.tags}" th:text="${tag}">标签</span>
                    </div>
                    <a th:href="@{'/article/' + ${article.id}}" class="read-more">阅读全文 &rarr;</a>
                </div>
            </div>

            <div th:if="${showPagination}" class="pagination">
                <a th:if="${hasPrevious}" th:href="${previousUrl}">&larr; 上一页</a>
                <span th:if="${!hasPrevious}"></span>
                
                <span class="page-info" th:text="'第 ' + ${currentPageDisplay} + ' / ' + ${totalPages} + ' 页'"></span>
                
                <a th:if="${hasNext}" th:href="${nextUrl}">下一页 &rarr;</a>
                <span th:if="${!hasNext}"></span>
            </div>
        </main>
        <footer class="site-footer">powered by Kiblog</footer>
    </div>
    <div class="about-modal" id="aboutModal" aria-hidden="true">
        <div class="about-dialog" role="dialog" aria-modal="true" aria-labelledby="aboutDialogTitle">
            <div class="about-dialog-header">
                <div class="about-identity">
                    <div class="about-avatar" aria-hidden="true">
                        <img th:if="${!#strings.isEmpty(brandAboutAvatarPath)}"
                             th:src="${brandAboutAvatarPath}"
                             th:alt="${brandAboutName + ' avatar'}">
                        <span th:if="${#strings.isEmpty(brandAboutAvatarPath)}"
                              th:text="${brandAvatarFallback}">KB</span>
                    </div>
                    <div class="about-heading">
                        <h2 class="about-dialog-title" id="aboutDialogTitle" th:text="${brandAboutName}">Kiblog</h2>
                        <p class="about-subtitle" th:text="${brandAboutSubtitle}">记录技术、产品与长期学习过程中的思考。</p>
                    </div>
                </div>
                <button type="button" class="btn btn-secondary about-close" id="aboutCloseBtn" aria-label="关闭简介">×</button>
            </div>
            <div class="about-body">
                <p th:text="${brandAboutDescription}">这里主要用来整理编程实践、产品体验和日常学习中的零散想法，希望把它们慢慢沉淀成更清晰、也更值得回看的内容。</p>
            </div>
        </div>
    </div>
    <script src="/js/theme.js"></script>
    <script>
        (function () {
            const aboutModal = document.getElementById("aboutModal");
            const aboutOpenBtn = document.getElementById("aboutOpenBtn");
            const aboutCloseBtn = document.getElementById("aboutCloseBtn");

            if (!aboutModal || !aboutOpenBtn || !aboutCloseBtn) {
                return;
            }

            function openModal() {
                aboutModal.classList.add("is-open");
                aboutModal.setAttribute("aria-hidden", "false");
                document.body.style.overflow = "hidden";
            }

            function closeModal() {
                aboutModal.classList.remove("is-open");
                aboutModal.setAttribute("aria-hidden", "true");
                document.body.style.overflow = "";
            }

            aboutOpenBtn.addEventListener("click", openModal);
            aboutCloseBtn.addEventListener("click", closeModal);
            aboutModal.addEventListener("click", function (event) {
                if (event.target === aboutModal) {
                    closeModal();
                }
            });
            document.addEventListener("keydown", function (event) {
                if (event.key === "Escape" && aboutModal.classList.contains("is-open")) {
                    closeModal();
                }
            });
        })();
    </script>
</body>
</html>
